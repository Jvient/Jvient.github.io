- title: Experience
  type: time_table
  contents:
    - title: Data Scientist for Oceanographic Analysis
      institution: SHOM — Service Hydrographique et Océanographique de la Marine
      year: 2025 - now
      description:
        - Innovation Lab Agent at SHOM, collaborating with operational departments to design and deliver projects combining oceanography and artificial intelligence.
        - Development of oceanographic products, use cases and proof-of-concepts based on the exploitation of physical oceanography data and in-situ / satellite observations.
        - Design of AI-driven methods for the analysis, reconstruction and forecasting of ocean variables (turbidity, surface dynamics, water masses).
        - Scientific and technical expertise on AI applied to oceanography, including collaborations with academic partners (IMT Atlantic, IUEM, Ifremer).
