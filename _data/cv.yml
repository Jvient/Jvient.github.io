    - title: Data & AI Architect Engineer
      institution: SHOM — Service Hydrographique et Océanographique de la Marine
      year: 2023 - 2025
      description:
        - Support to business teams in the design and deployment of operational and exploratory Data / AI processes.
        - Implementation of technical architectures and DevOps/MLOps pipelines on bare-metal servers (Kubernetes HA, Spark, MinIO, GPU).
        - Contribution to SHOM's IT system modernization and drafting of technical specifications.

    - title: PhD Student in Ocean Data Science
      institution: Université de Bretagne Occidentale — IUEM / IMT Atlantic / SHOM
      year: 2019 - 2022
      description:
        - Development of deep learning architectures (end-to-end neural interpolation, data-driven assimilation) to reconstruct sea surface suspended sediment concentrations from partial satellite observations.
        - Coupling of ocean colour remote sensing products with hydrodynamic-sedimentary model outputs (MARS3D) to improve spatio-temporal coverage of turbidity fields in coastal environments.
        - Two first-author peer-reviewed articles in Remote Sensing (MDPI, 2021 & 2022).

    - title: Research Intern — End of studies internship
      institution: SHOM
      year: 2019
      description:
