    summary:
      - PhD in AI & oceanographic data processing. Geoscience engineer specialized in the application of machine learning and data assimilation to ocean remote sensing and hydrodynamic modeling.

    experience:
      - company: SHOM — Service Hydrographique et Océanographique de la Marine
        position: Data Scientist for Oceanographic Analysis
        location: Brest, France
        start_date: 2025-04
        end_date: present
        highlights:
          - Innovation Lab Agent at SHOM, collaborating with operational departments to design and deliver projects combining oceanography and artificial intelligence.
          - Development of oceanographic products, use cases and proof-of-concepts based on the exploitation of physical oceanography data and in-situ / satellite observations.
          - Design of AI-driven methods for the analysis, reconstruction and forecasting of ocean variables (turbidity, surface dynamics, water masses), in support of SHOM's hydrographic and oceanographic missions.
          - Scientific and technical expertise on AI applied to oceanography, including collaborations with academic partners (IMT Atlantic, IUEM, Ifremer).
          - Contribution to SHOM's scientific and operational outreach in AI-driven oceanography.

      - company: SHOM — Service Hydrographique et Océanographique de la Marine
        position: Data & AI Architect Engineer
        location: Brest, France
        start_date: 2023-02
        end_date: 2025-04
        highlights:
          - Support to business teams in the design and deployment of operational and exploratory Data / AI processes.
          - Implementation of technical architectures and DevOps/MLOps pipelines on bare-metal servers (Kubernetes HA, Spark, MinIO, GPU infrastructure).
          - Contribution to SHOM's IT system modernization and drafting of technical specifications.

      - company: Université de Bretagne Occidentale — IUEM / IMT Atlantic / SHOM
        position: PhD Student in Ocean Data Science
        location: Brest, France
        start_date: 2019-10
        end_date: 2022-12
        highlights:
          - PhD thesis "Assimilation of the spatio-temporal dynamics of turbidity through synergy between ocean colour satellite measurements and hydrodynamic simulations".
          - Development of deep learning architectures (end-to-end neural interpolation, data-driven assimilation) to reconstruct sea surface suspended sediment concentrations from partial satellite observations.
          - Coupling of ocean colour remote sensing products with hydrodynamic-sedimentary model outputs (MARS3D) to improve the spatio-temporal coverage of turbidity fields in coastal environments.
          - Two first-author peer-reviewed articles published in Remote Sensing (MDPI, 2021 & 2022).
          - Thesis directed by Christophe Delacourt (IUEM) and Ronan Fablet (IMT Atlantic), supervised by Frédéric Jourdin (SHOM).

      - company: SHOM
        position: Research Intern — End of studies internship
        location: Brest, France
        start_date: 2019-01
        end_date: 2019-07
        highlights:
          - Learning methods for ocean transparency prediction, in partnership with IMT Atlantic.
          - Processing of hydrosedimentary model outputs to design and benchmark algorithmic methods for water transparency prediction.
          - Application of data assimilation methods to coastal turbidity data.
          - Participation in the SHOM hydrographic vessel campaign MEPELS (at-sea expertise and sampling).

